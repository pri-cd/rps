<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Papers Scissors</title>
    <link rel="stylesheet" href="./assets/styles.css">
    <script src="./assets/script.js" defer></script>
</head>

<body>
    <div class="header headingText">
        <div class="logo"><img src="./assets/rps-logo.png" alt=""></div>
        <div class="title">Rock Paper Scissors</div>
    </div>

    <div class="rpsUI">
        <div id="buttonContainer" class="buttonContainer">
            <button id="r" class="rpsButtons"><img src="./assets/rock.svg" alt=""></button>
            <button id="p" class="rpsButtons"><img src="./assets/paper.svg" alt=""></button>
            <button id="s" class="rpsButtons"><img src="./assets/scissors.svg" alt=""></button>
        </div>

        <div id="infoHolder" class="infoHolder">
            <div id="resultsContainer" class="resultsContainer">

                <div id="humanInfoHolder" class="playerInfoHolder">
                    <div class="headingText">Player</div>
                </div>

                <div id="machineInfoHolder" class="playerInfoHolder">
                    <div class="headingText">Machine</div>
                </div>

            </div>
            <div id="utilityInfoHolder" class="utilityInfoHolder">
                <div id="resultMessage" class="center scoreText"></div>
                <button id="resetGameButton" class="center">Reset Game</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="attribution"><a target="_blank" referrerpolicy="noopener noreferrer" href="https://www.flaticon.com/free-icons/rock-paper-scissors" title="rock paper scissors icons">Rock paper scissors icons created by Freepik - Flaticon</a></div>
    </div>
</body>

</html>
